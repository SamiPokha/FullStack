<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Styles/birthdaygif.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">
    <title>Birthday GIFt</title>
</head>
<body>
    <div class="header">
        <h1>Today is Winnie the Pooh's birthday! 🎉 </h1>
        <img id="b-pic" src="https://shop.aquadigitizing.com/wp-content/uploads/2024/03/Winnie-The-Pooh-Vector-Watermark.jpg" alt="A picture of Winnie the Pooh eating honey.">
        <h2 id="bday-age">100 years old</h2>
        <h4 id="bday-date">01.05.2026</h4>
    </div>
    <div class="gift-section">
        <h2 class="gift-title">Here's how happy I am for you today! 🥳</h2>
        <h3 class="gift-hint">(Hover over the gift)</h3>
        <div class="gift-img" id="gift-img-happy"></div>
    </div>
    <div class="gift-section">
        <h2 class="gift-title">How people react when you enter the room 😍</h2>
        <div class="gift-img" id="gift-img-hot"></div>
    </div>
    <div class="gift-section">
        <h2 class="gift-title">If had to describe you with ONE word 👇</h2>
        <div class="gift-img" id="gift-img-genius"></div>
    </div>

    <div class="gift-section">
        <h2 class="gift-title">The only person as badass as you 💪</h2>
        <div class="gift-img" id="gift-img-badass"></div>
    </div>
    <div class="gift-section">
        <h2>This one's for you, my friend 🥂</h2>
        <div class="gift-img" id="gift-img-cheers"></div>
    </div>
</body>
</html>
